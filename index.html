    { id:'tiger',      emoji:'🐯', name:'Тигриный дух',    rarity:'epic',      baseCost:15000, incomePerSec:150,tapBonus:12,maxLevel:4  },
    { id:'phoenix',    emoji:'🦅', name:'Феникс',          rarity:'legendary', baseCost:60000, incomePerSec:500,tapBonus:25,maxLevel:3  },
    { id:'universe',   emoji:'🌀', name:'Сила вселенной',  rarity:'legendary', baseCost:200000,incomePerSec:1200,tapBonus:60,maxLevel:3 },
    { id:'panda_god',  emoji:'🐼', name:'Панда-Бог',       rarity:'legendary', baseCost:999999,incomePerSec:5000,tapBonus:150,maxLevel:1 },
  ]
};

const LEVELS = [
  { min:0,      name:'Ученик' },
  { min:500,    name:'Искатель' },
  { min:2000,   name:'Практик' },
  { min:10000,  name:'Мастер' },
  { min:50000,  name:'Наставник' },
  { min:200000, name:'Мудрец' },
  { min:1000000,name:'Просветлённый 🌟' },
];

let coins = 0, totalTaps = 0, tapPower = 1, autoPerSec = 0;
let cardLevels = {};
let currentTab = 'zen';
let playerName = '';
let lastQuoteIdx = -1;

Object.values(ALL_CARDS).flat().forEach(c => cardLevels[c.id] = 0);

function getRandomQuote() {
  let idx;
  do { idx = Math.floor(Math.random() * QUOTES.length); } while (idx === lastQuoteIdx);
  lastQuoteIdx = idx;
  return QUOTES[idx];
}

function showQuote() {
  const q = getRandomQuote();
  const bubble = document.getElementById('quoteBubble');
  const text = document.getElementById('quoteText');
  const author = document.getElementById('quoteAuthor');
  text.textContent = q.text;
  author.textContent = q.author;
  bubble.classList.add('flash');
  setTimeout(() => bubble.classList.remove('flash'), 400);
}

function saveName() {
  const n = document.getElementById('nameInput').value.trim();
  if (!n) return;
  playerName = n;
  localStorage.setItem('panda_name', n);
  document.getElementById('nameModal').style.display = 'none';
}
function checkName() {
  const n = localStorage.getItem('panda_name');
  if (n) { playerName = n; document.getElementById('nameModal').style.display = 'none'; }
}

function saveGame() {
  localStorage.setItem('panda_v1', JSON.stringify({ coins, totalTaps, tapPower, autoPerSec, cardLevels }));
}
function loadGame() {
  try {
    const s = localStorage.getItem('panda_v1');
    if (!s) return;
    const d = JSON.parse(s);
    coins = d.coins||0; totalTaps = d.totalTaps||0; tapPower = d.tapPower||1; autoPerSec = d.autoPerSec||0;
    if (d.cardLevels) Object.keys(d.cardLevels).forEach(k => { if (cardLevels[k]!==undefined) cardLevels[k]=d.cardLevels[k]; });
  } catch(e) {}
}

async function fetchLeaderboard() {
  try {
    const r = await fetch(API_URL+'/latest', { headers: { 'X-Master-Key': API_KEY } });
    const data = await r.json();
    return data.record.leaderboard || [];
  } catch(e) { return []; }
}
async function updateLeaderboard() {
  if (!playerName) return;
  try {
    let lb = await fetchLeaderboard();
    const idx = lb.findIndex(p => p.name === playerName);
    const entry = { name: playerName, coins: Math.floor(coins) };
    if (idx >= 0) { if (coins > lb[idx].coins) lb[idx] = entry; }
    else lb.push(entry);
    lb.sort((a,b) => b.coins - a.coins);
    lb = lb.slice(0, 20);
    await fetch(API_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ leaderboard: lb })
    });
  } catch(e) {}
}
async function renderLeaderboard() {
  const sec = document.getElementById('leaderboardSection');
  sec.innerHTML = '<div class="lb-loading">⏳ Загрузка мудрецов...</div>';
  const lb = await fetchLeaderboard();
  if (!lb.length) { sec.innerHTML = '<div class="lb-loading">Пока никого нет 🌿<br>Стань первым мудрецом!</div>'; return; }
  const medals = ['🥇','🥈','🥉'];
  const rankClass = ['gold','silver','bronze'];
  sec.innerHTML = lb.map((p,i) => `
    <div class="lb-row${p.name===playerName?' me':''}">
      <div class="lb-rank ${rankClass[i]||''}">${medals[i]||(i+1)}</div>
      <div class="lb-name">${p.name}${p.name===playerName?' 👈':''}</div>
      <div class="lb-coins">☯️ ${formatNum(p.coins)}</div>
    </div>`).join('');
}

function formatNum(n) {
  if (n>=1e9) return (n/1e9).toFixed(1)+'Б';
  if (n>=1e6) return (n/1e6).toFixed(1)+'М';
  if (n>=1e3) return (n/1e3).toFixed(1)+'К';
  return Math.floor(n).toLocaleString('ru');
}
function getCardCost(card) { return Math.floor(card.baseCost * Math.pow(2.5, cardLevels[card.id])); }
function getLevelInfo() {
  let idx=0;
  for (let i=LEVELS.length-1;i>=0;i--) { if (coins>=LEVELS[i].min) { idx=i; break; } }
  return { idx, ...LEVELS[idx] };
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['zen','nature','power','top'][i]===tab);
  });
  const titles = { zen:'🍵 Дзен-практики', nature:'🌿 Силы природы', power:'⚡ Духовная сила', top:'🏆 Великие мудрецы' };
  document.getElementById('sectionTitle').textContent = titles[tab];
  document.getElementById('cardsGrid').style.display = tab==='top'?'none':'grid';
  document.getElementById('leaderboardSection').style.display = tab==='top'?'block':'none';
  if (tab==='top') renderLeaderboard();
  else renderCards();
}

function updateUI() {
  document.getElementById('coinsAmt').textContent = formatNum(coins);
  document.getElementById('tapPowerStat').textContent = '+'+tapPower;
  document.getElementById('autoEarnStat').textContent = autoPerSec+'/с';
  document.getElementById('totalTapsStat').textContent = formatNum(totalTaps);
  document.getElementById('autoTickerVal').textContent = autoPerSec;
  const lvl = getLevelInfo();
  document.getElementById('levelBadge').textContent = `УР.${lvl.idx+1} — ${lvl.name}`;
  const nextIdx = lvl.idx+1;
  if (nextIdx<LEVELS.length) {
    const prev=LEVELS[lvl.idx].min, next=LEVELS[nextIdx].min;
    const pct=Math.min(100,((coins-prev)/(next-prev))*100);
    document.getElementById('progressBar').style.width=pct+'%';
    document.getElementById('progressLabel').textContent=`${formatNum(coins-prev)} / ${formatNum(next-prev)} до просветления`;
  } else {
    document.getElementById('progressBar').style.width='100%';
    document.getElementById('progressLabel').textContent='ПРОСВЕТЛЁН 🌟';
  }
  if (currentTab!=='top') renderCards();
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  if (currentTab==='top') return;
  grid.innerHTML='';
  const cards = ALL_CARDS[currentTab];
  if (!cards) return;
  cards.forEach(card => {
    const lvl=cardLevels[card.id];
    const isMax=lvl>=card.maxLevel;
    const cost=getCardCost(card);
    const canAfford=coins>=cost;
    const incomeNow=card.incomePerSec*(lvl+1);
    const el=document.createElement('div');
    el.className=`biz-card rarity-${card.rarity}`+(isMax?' maxed':(!canAfford?' locked':''));
    let dots='';
    for (let i=0;i<Math.min(card.maxLevel,5);i++) dots+=`<div class="cdot${i<lvl?' filled':''}"></div>`;
    const rarityNames={common:'Обычная',rare:'Редкая',epic:'Эпическая',legendary:'Легендарная'};
    el.innerHTML=`
      <div class="card-top"><div class="card-emoji">${card.emoji}</div><div class="card-rarity-badge">${rarityNames[card.rarity]}</div></div>
      <div class="card-name">${card.name}</div>
      <div class="card-income">+${formatNum(incomeNow)} <span>/сек</span>${card.tapBonus?`  +${card.tapBonus*Math.max(1,lvl)} <span>тап</span>`:''}</div>
      <div class="card-bottom">
        <div class="card-level-dots">${dots}</div>
        <div class="card-cost ${isMax?'maxed-txt':''}">${isMax?'✅ МАКС':'☯️ '+formatNum(cost)}</div>
      </div>`;
    if (!isMax&&canAfford) el.addEventListener('click',()=>buyCard(card.id));
    grid.appendChild(el);
  });
}

function buyCard(id) {
  const card=Object.values(ALL_CARDS).flat().find(c=>c.id===id);
  const cost=getCardCost(card);
  if (coins<cost||cardLevels[id]>=card.maxLevel) return;
  coins-=cost; cardLevels[id]++; tapPower+=card.tapBonus; autoPerSec+=card.incomePerSec;
  const btn=document.getElementById('pandaBtn');
  btn.style.transform='scale(1.12)';
  setTimeout(()=>btn.style.transform='',180);
  updateUI(); saveGame();
}

let tapCount = 0;
function handleTap(e) {
  coins+=tapPower; totalTaps++; tapCount++;
  if (tapCount % 5 === 0) showQuote();
  const fc=document.createElement('div');
  fc.className='float-coin'; fc.textContent='+'+tapPower;
  fc.style.left=(e.clientX-15)+'px'; fc.style.top=(e.clientY-10)+'px';
  document.body.appendChild(fc); setTimeout(()=>fc.remove(),900);
  const rip=document.createElement('div');
  rip.className='ripple';
  rip.style.cssText=`width:60px;height:60px;left:${e.clientX-30}px;top:${e.clientY-30}px`;
  document.body.appendChild(rip); setTimeout(()=>rip.remove(),500);
  updateUI(); saveGame();
}

document.getElementById('pandaBtn').addEventListener('click', handleTap);
document.getElementById('pandaBtn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t=e.touches[0];
  handleTap({ clientX:t.clientX, clientY:t.clientY });
}, { passive:false });

setInterval(()=>{ if(autoPerSec>0){coins+=autoPerSec;updateUI();saveGame();} },1000);
setInterval(()=>{ updateLeaderboard(); },30000);

loadGame(); checkName(); updateUI();
setTimeout(updateLeaderboard,3000);

// Show first quote
showQuote();
</script>
</body>
</html>
